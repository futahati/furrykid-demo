<!DOCTYPE html>
<!-- lang要修改 en→ zh-tw -->
<html lang="zh-tw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>使用者登入</title>

    <style>
        /* CSS選擇器=> 通用選擇器
        表示「所有元素」，其代表符號為一個星號「*」，使用後會將樣式套用到所有的元素，通用選擇器常用在進行「CSS 初始化」的動作 */
        * {
            box-sizing: border-box;
            /* 定義寬高顯示方式 */
            margin: 0;
            /* 外邊界 */
            padding: 0;
            /* 內邊距 */
        }

        body {
            font-family: 'Microsoft JhengHei', PMingLiU, DFKai-SB, fantasy, cursive, sans-serif;
            background-color: rgb(232, 216, 216);
            color: rgb(107, 134, 218);
            font-size: 2rem;
            text-align: center;
            padding: 30px;
        }

        h1 {
            margin-bottom: 10px;
        }

        /* h1::after {
            content: "";
            必須要有 content 才會顯示
            display: block;
            讓它變成區塊元素
            width: 50px;
            設定線的長度
            height: 3px;
            設定線的厚度
            background: blue;
            設定顏色
            margin-top: 10px;
            與文字的間距
        } */

        hr {
            border: 0;
            /* 先拿掉預設邊框 */
            height: 5px;
            /* 設定高度 */
            background-image: linear-gradient(to right, transparent, #333, transparent);
            /* 漸層線條 */
            margin: 40px 0;
            /* 上下間距 */
        }
    </style>
</head>

<body>
    <h1>毛孩兒家長登入區</h1>
    <hr>
    <form id="inpForm" action="" class="log-form">

        <div class="form-inp">
            <label for="email">信箱：</label>
            <!-- required：欄位成為必填／placeholder：輸入框內顯示提示文字 -->
            <input required type="email" id="email" name="email" placeholder="必填！">
        </div>

        <div class="form-inp">
            <label for="password">密碼：</label>
            <input required type="password" id="password" name="password" placeholder="英文+數字，共8碼">
        </div>

        <br>
        <button type="register">
            <a href="furrykid.html">註冊</a>
        </button>
        <button type="login">
            <a href="furrykid.html">登入</a>
        </button>
    </form>

</body>

</html>
