<!DOCTYPE html>
<!-- lang要修改 en→ zh-tw -->
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>使用者登入</title>
</head>
<body>
    <h1>毛孩兒家長登入區</h1>
    <hr>
    <form action="">
        <p>
            <label for="email">信箱：</label>
            <!-- required：欄位成為必填／placeholder：輸入框內顯示提示文字 -->
            <input required type="email" id="email" name="email" placeholder="必填！">
        </p>
        <p>
            <label for="password">密碼：</label>
            <input required type="password" id="password" name="password" placeholder="英文+數字，共8碼">
        </p>
        <br>
        <button type="register">
            <a href="furrykid.html">註冊</a>
        </button>
        <button type="login">
            <a href="furrykid.html">登入</a>
        </button>
    </form>

</body>
</html>
